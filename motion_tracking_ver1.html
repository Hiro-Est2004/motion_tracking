<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Tracking.ver1</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WBQE15HEYL"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-WBQE15HEYL');
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#msg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.3);
  font-size: 25px;
  font-family: monospace;
  text-align: center;
  line-height: 2.2;
  pointer-events: none;
  transition: opacity 1.5s;
}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted style="display:none;"></video>
<canvas id="c"></canvas>
<div id="msg">loading...</div>

<script type="module">
import {
  PoseLandmarker,
  HandLandmarker,
  FaceLandmarker,
  FilesetResolver,
  DrawingUtils,
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

const video  = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msg    = document.getElementById('msg');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ランドマーク
let posePts = [];
let handPts = [];
let facePts = [];
let faceRawLandmarks = []; // DrawingUtils用生データ

const CONNECT_DIST = 55;

// 手の骨格接続
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],       // 親指
  [0,5],[5,6],[6,7],[7,8],       // 人差し指
  [0,9],[9,10],[10,11],[11,12],  // 中指
  [0,13],[13,14],[14,15],[15,16],// 薬指
  [0,17],[17,18],[18,19],[19,20],// 小指
  [5,9],[9,13],[13,17],          // 手のひら横
];

// FaceMeshは全点使用（DrawingUtilsで描画）

// Poseスケルトン接続
const POSE_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10],
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [15,17],[15,19],[15,21],[17,19],
  [16,18],[16,20],[16,22],[18,20],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[24,26],[26,28],
  [27,29],[29,31],[27,31],[28,30],[30,32],[28,32],
];

function lmToScreen(lm) {
  return { x: (1 - lm.x) * W, y: lm.y * H };
}

let tick = 0;
let segMask = null;
const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d');

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0, 0, W, H);

  const allPts = [...posePts, ...handPts]; // 顔はメッシュのみ、ネットワークから除外

  if (allPts.length === 0) {
    tick++;
    requestAnimationFrame(draw);
    return;
  }

  // 1. Poseスケルトン線
  for (const [a, b] of POSE_CONNECTIONS) {
    if (!posePts[a] || !posePts[b]) continue;
    const pa = posePts[a], pb = posePts[b];
    const hue = 210 + Math.sin(tick * 0.008) * 20;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `hsla(${hue},50%,60%,0.35)`;
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }

  // 2. 距離ベースネットワーク
  for (let a = 0; a < allPts.length; a++) {
    for (let b = a + 1; b < allPts.length; b++) {
      const pa = allPts[a], pb = allPts[b];
      const dx = pa.x - pb.x, dy = pa.y - pb.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < CONNECT_DIST) {
        const t = 1 - dist / CONNECT_DIST;
        const hue = 200 + Math.sin(tick * 0.01 + a * 0.4) * 35;
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.strokeStyle = `hsla(${hue},65%,72%,${t * 0.55})`;
        ctx.lineWidth = t * 1.0;
        ctx.stroke();
      }
    }
  }

  // 3. ノード描画（体・手のみ、顔はメッシュで描く）
  for (let i = 0; i < posePts.length + handPts.length; i++) {
    const p = allPts[i];
    const isHand = i >= posePts.length;
    const hue = isHand
      ? 200 + Math.sin(tick*0.015+i*0.6)*30
      : 220 + Math.sin(tick*0.01+i*0.4)*20;
    const pulse = 0.75 + 0.25 * Math.sin(tick * 0.05 + i * 0.9);
    const size  = isHand ? 1.8*pulse : 3.0*pulse;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${hue},55%,80%,${isHand ? 0.85 : 0.75})`;
    ctx.fill();
  }

  // 2. 手：骨格線
  const handsCount = handPts.length / 21 | 0;
  for (let h = 0; h < handsCount; h++) {
    const base = h * 21;
    const hue = 200 + Math.sin(tick*0.01+h*40)*30;
    for (const [a, b] of HAND_CONNECTIONS) {
      const pa = handPts[base+a], pb = handPts[base+b];
      if (!pa || !pb) continue;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = `hsla(${hue},60%,70%,0.7)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // 3. 手ノード描画
  for (let i = 0; i < handPts.length; i++) {
    const p = handPts[i];
    const hue = 200 + Math.sin(tick*0.015+i*0.6)*30;
    const pulse = 0.75 + 0.25*Math.sin(tick*0.05+i*0.9);
    // 指先（4,8,12,16,20）は少し大きく
    const isTip = [4,8,12,16,20].includes(i%21);
    ctx.beginPath();
    ctx.arc(p.x, p.y, (isTip ? 5.0 : 3.8)*pulse, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${hue},55%,80%,0.85)`;
    ctx.fill();
  }

  // 4. 顔メッシュ描画（左右反転して正しい向きに）
  if (faceRawLandmarks.length > 0) {
    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    const drawingUtils = new DrawingUtils(ctx);
    const hue = 210 + Math.sin(tick * 0.01) * 20;
    // テッセレーション（メッシュ面）
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_TESSELATION,
      { color: `hsla(${hue},50%,65%,0.18)`, lineWidth: 0.5 }
    );
    // 顔の輪郭
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_FACE_OVAL,
      { color: `hsla(${hue},60%,75%,0.6)`, lineWidth: 1.0 }
    );
    // 目
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
      { color: `hsla(${hue},60%,80%,0.8)`, lineWidth: 1.0 }
    );
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
      { color: `hsla(${hue},60%,80%,0.8)`, lineWidth: 1.0 }
    );
    // 口
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_LIPS,
      { color: `hsla(${hue},60%,80%,0.8)`, lineWidth: 1.0 }
    );
    // 眉
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_LEFT_EYEBROW,
      { color: `hsla(${hue},60%,80%,0.7)`, lineWidth: 1.0 }
    );
    drawingUtils.drawConnectors(
      faceRawLandmarks,
      FaceLandmarker.FACE_LANDMARKS_RIGHT_EYEBROW,
      { color: `hsla(${hue},60%,80%,0.7)`, lineWidth: 1.0 }
    );
    // ランドマーク点
    // 顔のランドマーク点は非表示
    ctx.restore();
  }

  tick++;
  requestAnimationFrame(draw);
}

async function init() {
  msg.textContent = 'loading...';

  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );

  const poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numPoses: 1,
    outputSegmentationMasks: false,
  });

  const handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numHands: 2,
  });

  const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numFaces: 1,
  });

  // カメラ起動
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    video.play();
    msg.style.opacity = '0';
    setTimeout(() => { msg.style.display = 'none'; }, 1500);
  } catch(e) {
    msg.innerHTML = 'カメラを許可してください';
    return;
  }

  // 推論ループ（3フレームに1回ずつ交互）
  let frameCount = 0;
  let lastTime = -1;

  function detect() {
    const now = performance.now();
    if (now !== lastTime) {
      lastTime = now;
      const m = frameCount % 3;
      try {
        if (m === 0) {
          const result = poseLandmarker.detectForVideo(video, now);
          posePts = [];
          if (result.landmarks?.[0]) {
            posePts = result.landmarks[0].map(lm => lmToScreen(lm));
          }

        } else if (m === 1) {
          const result = handLandmarker.detectForVideo(video, now);
          handPts = [];
          for (const lms of (result.landmarks ?? [])) {
            for (const lm of lms) handPts.push(lmToScreen(lm));
          }
        } else {
          const result = faceLandmarker.detectForVideo(video, now);
          faceRawLandmarks = result.faceLandmarks?.[0] ?? [];
          facePts = []; // 未使用
        }
      } catch(e) {
        // タイミングエラー無視
      }
      frameCount++;
    }
    requestAnimationFrame(detect);
  }

  detect();
}

init();
draw();
</script>
</body>
</html>
